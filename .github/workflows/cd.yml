name: CD Pipeline


# ==========================================================
# Triggers
# ==========================================================
on:
  push:
    tags:
      - "v*.*.*"


# ==========================================================
# Jobs
# ==========================================================
jobs:

  # ========================================================
  # Publish Docker Image
  # ========================================================
  publish-docker-image:
    name: Publish Docker Image

    runs-on: ubuntu-latest

    steps:

      # ----------------------------------------------------
      # Checkout Repository
      # ----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4


      # ----------------------------------------------------
      # Setup Docker Buildx
      # ----------------------------------------------------
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4


      # ----------------------------------------------------
      # Login to Docker Hub
      # ----------------------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      # ----------------------------------------------------
      # Extract Version
      # ----------------------------------------------------
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"


      # ----------------------------------------------------
      # Build and Push Docker Image
      # ----------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./Project_01_Resume_Knowledge_Assistant
          file: ./Project_01_Resume_Knowledge_Assistant/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/resume-knowledge-assistant:${{ steps.version.outputs.version }}
            ${{ vars.DOCKERHUB_USERNAME }}/resume-knowledge-assistant:latest